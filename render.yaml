services:
  - type: web
    name: stockwatch
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stockwatch-db
          property: connectionString

databases:
  - name: stockwatch-db
    plan: free