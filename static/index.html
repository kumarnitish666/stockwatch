<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockWatch — Watchlist</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <div class="max-w-6xl mx-auto px-4 py-10">

    <header class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-3xl font-semibold">StockWatch</h1>
        <p class="text-slate-500 text-sm mt-1">52-week position and recent movement for your watchlist.</p>
      </div>
      <button id="refresh-btn"
              class="px-4 py-2 rounded-lg bg-slate-900 text-white text-sm font-medium hover:bg-slate-700 transition">
        Refresh
      </button>
    </header>

    <div id="status" class="text-slate-500 text-xs mb-3"></div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-slate-100 text-slate-600 text-xs uppercase tracking-wide">
          <tr>
            <th class="text-left px-4 py-3">Stock</th>
            <th class="text-right px-4 py-3">Current</th>
            <th class="text-right px-4 py-3">52w Low</th>
            <th class="text-right px-4 py-3">52w High</th>
            <th class="text-right px-4 py-3">52w Position</th>
            <th class="text-right px-4 py-3">7d %</th>
            <th class="text-right px-4 py-3">30d %</th>
          </tr>
        </thead>
        <tbody id="watchlist-body" class="divide-y divide-slate-100">
          <tr><td colspan="7" class="text-center text-slate-400 py-8">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <p class="text-xs text-slate-400 mt-6 text-center">
      Data: Yahoo Finance via yfinance. Not investment advice.
    </p>

  </div>
  <script src="/static/app.js"></script>
</body>
</html>
